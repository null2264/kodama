name: Build app

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Gradle
        uses: null2264/actions/gradle-java-setup@7a4ac4e12f36a469b70e0c61fe4c0f10166f754f
        with:
          java: 17
          distro: temurin

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug

